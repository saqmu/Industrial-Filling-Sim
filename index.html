        .active { color: #00ff00; font-weight: bold; }
    </style>
</head>

        <h1>🏭 SISTEMA DE ENVASE INDUSTRIAL</h1>
        <p>Status: <span id="conn">Aguardando Hardware...</span></p>
        <hr>
        <div id="debug-buttons">
            <div id="b0" class="btn-status">BOTÃO 1 (Index 0): Ocioso</div>
            <div id="b1" class="btn-status">BOTÃO 2 (Index 1): Ocioso</div>
            <div id="b2" class="btn-status">BOTÃO 3 (Index 2): Ocioso</div>

        <p id="instruction">Aperte um botão para calibrar...</p>
    </div>

    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURAÇÃO DA CENA ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- GARRAFA ---
        const bottleGroup = new THREE.Group();
        const glassGeo = new THREE.CylinderGeometry(0.5, 0.5, 2.2, 32, 1, true);
        const glassMat = new THREE.MeshPhongMaterial({ color: 0x88ccff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const bottle = new THREE.Mesh(glassGeo, glassMat);
        bottleGroup.add(bottle);

        // --- LÍQUIDO REALISTA (Massa que cresce) ---
        const liquidGeo = new THREE.CylinderGeometry(0.48, 0.48, 2, 32);
        const liquidMat = new THREE.MeshPhongMaterial({ color: 0x00ff44, emissive: 0x003300 });
        const liquidMesh = new THREE.Mesh(liquidGeo, liquidMat);
        liquidMesh.scale.set(1, 0.001, 1); // Começa vazio
        liquidMesh.position.y = -1; // No fundo da garrafa
        bottleGroup.add(liquidMesh);
        scene.add(bottleGroup);

        // --- CHÃO/ESTEIRA ---
        const floor = new THREE.GridHelper(20, 20, 0x00ff00, 0x222222);
        scene.add(floor);

        camera.position.set(0, 2, 5);
        camera.lookAt(0, 1, 0);

        // --- PARTÍCULAS DE QUEDA ---
        let particles = [];
        let fillLevel = 0.001;

        function dropParticle() {
            const pGeo = new THREE.SphereGeometry(0.06, 8, 8);
            const pMat = new THREE.MeshBasicMaterial({ color: 0x00ff44 });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.set(bottleGroup.position.x, 4, 0); // Sempre cai no X da garrafa
            scene.add(p);
            particles.push({ mesh: p, velocity: 0 });
        }
